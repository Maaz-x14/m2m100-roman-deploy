<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Evaluation pipeline architecture</title>
<desc>Layer 1 runs the fine-tuned model on CPU over 2189 rows, flagging structural issues. Layer 2 sends those rows to GPT-5.4-mini via the OpenAI API for a phonetic/semantic judgment. Results are then deduplicated and filtered for review.</desc>
<defs>
<marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="680" height="520" fill="#ffffff"/>

<rect x="270" y="20" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="46" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Dataset (2189 rows)</text>

<line x1="340" y1="64" x2="340" y2="96" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="180" y="96" width="320" height="66" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="118" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">eval_layer1.py — CPU inference</text>
<text x="340" y="136" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#185FA5">9142.81s total · 4.18s/row · 0.239 rows/s</text>
<text x="340" y="152" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#185FA5">121 rows flagged (script leak, repeat loop, length)</text>

<line x1="340" y1="162" x2="340" y2="198" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="180" y="198" width="320" height="66" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="220" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">eval_layer2_openai.py — LLM judge</text>
<text x="340" y="238" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">GPT-5.4-mini · 275.25s · 15 batches</text>
<text x="340" y="254" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">998 clean · 1188 suspicious · 3 uncertain</text>

<line x1="340" y1="264" x2="340" y2="300" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="140" y="300" width="400" height="66" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="340" y="322" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#412402">layer2_results.csv</text>
<text x="340" y="340" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#854F0B">phonetic 998 · script leak 92 · degenerate 47</text>
<text x="340" y="356" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#854F0B">bad loanword 34 · iss/uss 6 · other 11</text>

<line x1="340" y1="366" x2="340" y2="398" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="130" y="398" width="180" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="220" y="418" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">filter_issue_type.py</text>
<text x="220" y="436" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">split by issue type</text>

<rect x="370" y="398" width="180" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="460" y="418" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">remove_reps.py</text>
<text x="460" y="436" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">dedupe flagged words</text>

<line x1="300" y1="384" x2="280" y2="398" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>
<line x1="420" y1="384" x2="440" y2="398" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<line x1="220" y1="448" x2="220" y2="470" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>
<line x1="460" y1="448" x2="460" y2="470" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="130" y="470" width="420" height="40" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="495" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Deduplicated, categorized review set</text>

</svg>
