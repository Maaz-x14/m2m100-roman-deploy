<svg width="680" height="460" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Romanize API architecture</title>
<desc>Client sends a request to the FastAPI service, which loads the base M2M100 model, applies a patch, merges LoRA adapter weights, and serves romanize and health endpoints.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="680" height="460" fill="#ffffff"/>

<rect x="270" y="20" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="46" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Client</text>

<line x1="340" y1="64" x2="340" y2="100" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="352" y="86" font-family="sans-serif" font-size="12" fill="#5F5E5A">POST /romanize</text>

<rect x="240" y="100" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="122" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">FastAPI router</text>
<text x="340" y="140" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#185FA5">app/api.py — /romanize, /health</text>

<line x1="340" y1="156" x2="340" y2="192" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="220" y="192" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="214" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">App factory + lifespan</text>
<text x="340" y="232" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#185FA5">app/main.py — startup, shutdown</text>

<line x1="340" y1="248" x2="340" y2="284" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="90" y="284" width="500" height="150" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="112" y="308" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">app/model.py</text>
<text x="112" y="326" font-family="sans-serif" font-size="12" fill="#0F6E56">Load, patch, merge, warm up</text>

<rect x="112" y="340" width="150" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="187" y="360" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">Base M2M100</text>
<text x="187" y="378" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">Mavkif checkpoint</text>

<line x1="262" y1="365" x2="288" y2="365" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="288" y="340" width="130" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="353" y="360" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">Patched model</text>
<text x="353" y="378" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">bug #3 fix</text>

<line x1="418" y1="365" x2="444" y2="365" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="444" y="340" width="130" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="509" y="360" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">LoRA merged</text>
<text x="509" y="378" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">merge_and_unload</text>

</svg>
